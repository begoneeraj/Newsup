name: NewsUp Slow Crisis Quant Cron

on:
  schedule:
    # Daily, not monthly - CPCB's AQI data on data.gov.in updates roughly
    # daily, and pipeline.slow_crisis_quant._compute_severity needs several
    # data points to detect a trend, so a monthly cadence (this repo's other
    # non-4h jobs run weekly/monthly) would take months to establish any
    # trend at all for a source that actually updates this fast.
    - cron: '0 4 * * *'
  workflow_dispatch: {}

jobs:
  update-slow-crisis-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run slow crisis quantitative update
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
        run: python src/main.py --sources slow_crisis_quant
