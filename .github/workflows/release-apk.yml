name: Build & Release APK

# Builds a signed-for-testing release APK so anyone can download and install
# TruthLens India without setting up a Flutter dev environment. Run it manually
# from the Actions tab any time, or push a `v*` tag to also publish a GitHub
# Release with the APK attached (a permanent download link).

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY"

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk TruthLensIndia-${{ github.run_number }}.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TruthLensIndia-apk
          path: TruthLensIndia-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TruthLensIndia-*.apk
